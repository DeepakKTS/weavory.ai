name: publish-image

# Builds the multi-arch weavory Docker image and pushes it to GitHub
# Container Registry on every `v*` tag push.
#
# Tags produced per release (for tag `v0.1.0`):
#   ghcr.io/<owner>/weavory:0.1.0
#   ghcr.io/<owner>/weavory:0.1
#   ghcr.io/<owner>/weavory:0
#   ghcr.io/<owner>/weavory:latest
#   ghcr.io/<owner>/weavory:<sha>
#
# No manual secrets needed — uses the built-in GITHUB_TOKEN with
# explicit `packages: write` permission.
#
# First-time setup (one UI click): after the first successful push,
# go to repo → Packages → weavory → Package settings → Change
# visibility → Public. Container packages inherit repo visibility
# (private by default); this flip makes `docker pull` work without
# auth.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: build + push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 cross build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weavory
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=weavory
            org.opencontainers.image.description=Shared belief coordination substrate for AI agents (MCP-native)
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
