name: publish-pages

# Assembles a small static site from the repo's existing HTML +
# JSON artifacts and deploys it to GitHub Pages on every push to
# `main`. The workflow never modifies the repo — it only copies
# files into a `_site/` build tree and hands that tree to Pages.
#
# First-time setup (two UI actions — both required):
#
#   1. Repo → Settings → Pages → Source: "GitHub Actions". Also
#      ensure the repo is either public OR the account has GitHub Pro
#      (Pages from a private repo is Pro-only).
#
#   2. Repo → Settings → Secrets and variables → Actions →
#      Variables tab → New repository variable:
#         Name:  PAGES_ENABLED
#         Value: true
#
#      The deploy job is gated on this variable so the workflow
#      stays GREEN on main pushes before Pages is enabled. Without
#      it, the build job runs and uploads an artifact, but the
#      deploy step is skipped (not failed).
#
# Site layout served by Pages:
#   /                 → docs-site/index.html (landing page)
#   /dashboard/       → ops/weavory-dashboard.html (truthful status dashboard)
#   /demo/            → ops/demo-dashboard.html + ops/data/demo-fixtures.json
#                       (live demo dashboard, replay-mode on Pages; mode=live
#                       is only available when run against a local sidecar)
#   /assets/          → ops/assets/ (logo, etc.)
#   /data/            → ops/data/{git,gates,tests,bench,runtime}.json
#                       (only non-gitignored artifacts that the
#                       dashboard reads; incidents/ is excluded)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: assemble static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build _site/ tree
        run: |
          set -euo pipefail
          mkdir -p _site/overview _site/dashboard _site/demo _site/assets _site/data

          # Landing page
          cp docs-site/index.html _site/index.html

          # Truthful status dashboard (visible at /dashboard/)
          cp ops/weavory-dashboard.html _site/dashboard/index.html

          # Live demo dashboard (visible at /demo/; replay mode with fixtures
          # since Pages is static — the live SSE path is localhost-only).
          cp ops/demo-dashboard.html _site/demo/index.html
          if [[ -f "ops/data/demo-fixtures.json" ]]; then
            cp ops/data/demo-fixtures.json _site/demo/fixtures.json
          else
            printf '{"events":[],"captured_at":null}\n' > _site/demo/fixtures.json
          fi

          # Static assets
          cp -R ops/assets/. _site/assets/

          # JSON data the dashboard reads live. Incidents intentionally
          # excluded (may contain sensitive object payloads — see
          # docs/SECURITY.md § SEC-05).
          for f in git.json gates.json tests.json bench.json runtime.json; do
            if [[ -f "ops/data/$f" ]]; then
              cp "ops/data/$f" "_site/data/$f"
            fi
          done

          # Tiny 404 so missing paths are friendly
          cat > _site/404.html <<'HTML'
          <!doctype html><html><head><meta charset="utf-8"><title>Not found — weavory.ai</title></head>
          <body style="font-family: system-ui; padding: 40px; background: #0a1628; color: #e6edf3;">
          <h1>404 — not here</h1>
          <p>Try <a style="color:#22d3ee" href="/">the landing page</a>,
          <a style="color:#22d3ee" href="/overview/">the overview</a>, or
          <a style="color:#22d3ee" href="/dashboard/">the dashboard</a>.</p>
          </body></html>
          HTML

          # Print a small manifest for the CI log
          find _site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to Pages
    needs: build
    # Gated on the PAGES_ENABLED repository variable so the workflow
    # stays GREEN on every main push before Pages is enabled in the
    # repo settings. Once the operator has done the two UI steps above,
    # set the variable and this job runs automatically on the next
    # push. Until then, this job is "skipped" (not failed).
    if: ${{ vars.PAGES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
