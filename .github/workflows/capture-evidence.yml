name: capture-stock-agent-evidence

# Phase N.4.5 — Responsible-AI track submission evidence.
#
# Runs a stock Claude Opus 4.7 agent against weavory's five MCP tools,
# grounded only in docs/README.md, and writes the redacted transcript to
# docs/evidence/stock-agent-session-v<VERSION>.md.
#
# Gated on the ANTHROPIC_API_KEY secret existing in the repo's Actions
# secrets. The secret never leaves CI — it is read from env, passed to the
# SDK client, and discarded. A same-script redactor scrubs sk-ant-* patterns
# and collapses 64-hex signer / belief ids to 12-hex prefixes before any
# bytes hit disk.
#
# Default: manual dispatch only. Not wired to push or tag triggers so it
# only runs when a human explicitly asks (and spends API credit).

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message suffix (optional)"
        required: false
        default: "via CI"

permissions:
  contents: write

concurrency:
  # One capture at a time — the bot push to main will be stomped by a
  # parallel run otherwise.
  group: capture-evidence
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Use the default GITHUB_TOKEN (persist-credentials=true by default)
          # so the later `git push` is authenticated without extra setup.

      - name: Fail fast if ANTHROPIC_API_KEY is not set
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY secret is not set on this repository." >&2
            echo "Add it under Settings → Secrets and variables → Actions." >&2
            exit 1
          fi
          echo "secret is present (length $(echo -n "$ANTHROPIC_API_KEY" | wc -c) chars; ignore the length — the value is masked)"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the capture
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm capture:gate7

      - name: Configure git for the bot commit
        run: |
          git config user.name "weavory-evidence-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit + push the transcript (if changed)
        env:
          SUFFIX: ${{ inputs.commit_message }}
        run: |
          git add docs/evidence/
          if git diff --cached --quiet; then
            echo "No transcript changes — nothing to commit."
            exit 0
          fi
          # Pull latest main to avoid non-fast-forward on concurrent pushes.
          git pull --rebase origin main
          git add docs/evidence/
          git commit -m "docs(N.4.5): capture stock-agent transcript ${SUFFIX}"
          git push origin HEAD:main

      - name: Upload transcript as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-agent-transcript
          path: docs/evidence/stock-agent-session-*.md
          if-no-files-found: warn
